name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          # - ubuntu-24.04-arm
          - macos-latest
          # - macos-13

        ocaml-compiler:
          - "5.3.0"

    runs-on: ${{ matrix.os }}
    steps:

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          opam-repositories: |
             default: https://github.com/ocaml/opam-repository.git

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Setup specific libdwarf from Ubuntu 25.10, our cram tests are
          # rather specific and need this version.
          sudo apt install llvm cmake
          wget -q https://github.com/davea42/libdwarf-code/releases/download/v0.11.1/libdwarf-0.11.1.tar.xz
          tar xf libdwarf-0.11.1.tar.xz
          cd libdwarf-0.11.1
          cmake -B build -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build build -j$(nproc)
          sudo cmake --install build
          sudo mkdir -p /usr/share/dwarfdump
          sudo cp /usr/local/share/dwarfdump/dwarfdump.conf /usr/share/dwarfdump/

      - name: Install dependencies
        run: |
          opam install . --deps-only --with-test --with-dev-setup

      - name: Build
        run: |
          opam exec -- dune build @all

      - name: Tests
        run: |
          opam exec -- dune build @runtest

      - name: Format
        run: |
          opam exec -- dune build @fmt
